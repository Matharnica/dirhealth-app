name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Test
        run: dotnet test src/DirHealth.Tests/DirHealth.Tests.csproj -c Release --verbosity normal

      - name: Publish
        run: |
          dotnet publish src/DirHealth.Desktop/DirHealth.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=${{ steps.version.outputs.version }} `
            -o ./publish

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/setup.iss
          options: /O+ /DAppVersion=${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirHealth-Setup
          path: installer/Output/DirHealth-Setup-${{ steps.version.outputs.version }}.exe
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: installer/Output/DirHealth-Setup-${{ steps.version.outputs.version }}.exe
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

